name: Build schedule ICS

on:
  push:
    paths:
      - "班表codex/**/*.xlsx"
      - "班表codex/sync_schedule.py"
      - "班表codex/requirements.txt"
      - ".github/workflows/build-schedule-ics.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r "班表codex/requirements.txt"

      - name: Build ICS files
        run: python "班表codex/sync_schedule.py" --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "班表codex/public"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
